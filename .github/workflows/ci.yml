name: CI/CD Pipeline
on:
  push:
      branches: ['**']
        pull_request:
            branches: [main]
            jobs:
              backend:
                  name: Backend — Build and Unit Tests
                      runs-on: ubuntu-latest
                          steps:
                                - uses: actions/checkout@v4
                                      - uses: actions/setup-node@v4
                                              with:
                                                        node-version: '20'
                                                              - name: Install dependencies
                                                                      working-directory: backend
                                                                              run: npm ci
                                                                                    - name: Run tests
                                                                                            working-directory: backend
                                                                                                    run: npm test
                                                                                                      frontend:
                                                                                                          name: Frontend — Build
                                                                                                              runs-on: ubuntu-latest
                                                                                                                  steps:
                                                                                                                        - uses: actions/checkout@v4
                                                                                                                              - uses: actions/setup-node@v4
                                                                                                                                      with:
                                                                                                                                                node-version: '20'
                                                                                                                                                      - name: Install dependencies
                                                                                                                                                              working-directory: frontend
                                                                                                                                                                      run: npm ci
                                                                                                                                                                            - name: Build
                                                                                                                                                                                    working-directory: frontend
                                                                                                                                                                                            run: npm run build
